name: release

# Cut a release by pushing a tag, e.g. `git tag v0.2.0 && git push origin v0.2.0`.
# A `-rc`/`-beta` tag publishes a prerelease.
#
# Two paths, chosen automatically by whether the signing secrets are configured:
#   - SIGNED  (secrets present): Developer-ID sign -> notarize -> staple -> zip ->
#     Sparkle EdDSA sign -> appcast.xml -> upload zip + appcast (Sparkle auto-update works).
#   - UNSIGNED (no secrets): build, zip, upload the zip only, and emit a warning that
#     there is no auto-update artifact. The release still happens; it just can't be
#     installed via Sparkle until signing/notarization is set up. See docs/release-signing.md.
#
# Required secrets for the SIGNED path:
#   DEVELOPER_ID_P12        base64 of a Developer ID Application .p12
#   DEVELOPER_ID_P12_PASSWORD
#   DEVELOPMENT_TEAM        the 10-char Apple Team ID
#   NOTARY_APPLE_ID, NOTARY_PASSWORD (app-specific), NOTARY_TEAM_ID
#   SPARKLE_ED_PRIVATE_KEY  the Sparkle EdDSA private key (generate_keys -x)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Swift packages
        run: xcodebuild -project Svod.xcodeproj -scheme Svod -resolvePackageDependencies

      - name: Detect signing secrets
        id: sign
        env:
          DEVID: ${{ secrets.DEVELOPER_ID_P12 }}
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -n "$DEVID" ] && [ -n "$SPARKLE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets missing — building UNSIGNED. The release will have no Sparkle auto-update artifact (no appcast). See docs/release-signing.md."
          fi

      - name: Import Developer ID certificate
        if: steps.sign.outputs.enabled == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          PW="$(uuidgen)"
          security create-keychain -p "$PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$PW" "$KEYCHAIN"
          echo "$DEVELOPER_ID_P12" | base64 --decode > "$RUNNER_TEMP/devid.p12"
          security import "$RUNNER_TEMP/devid.p12" -k "$KEYCHAIN" -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$PW" "$KEYCHAIN"

      - name: Build (signed)
        if: steps.sign.outputs.enabled == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          xcodebuild -project Svod.xcodeproj -scheme Svod -configuration Release \
            -derivedDataPath build/dd \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            build

      - name: Build (unsigned)
        if: steps.sign.outputs.enabled != 'true'
        run: |
          set -euo pipefail
          xcodebuild -project Svod.xcodeproj -scheme Svod -configuration Release \
            -derivedDataPath build/dd CODE_SIGNING_ALLOWED=NO build

      - name: Zip the app
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Release/Svod.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "Svod.zip"

      - name: Notarize + staple
        if: steps.sign.outputs.enabled == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "Svod.zip" --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" --team-id "$NOTARY_TEAM_ID" --wait
          xcrun stapler staple "build/dd/Build/Products/Release/Svod.app"
          rm -f "Svod.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/dd/Build/Products/Release/Svod.app" "Svod.zip"

      - name: Sparkle sign + appcast
        if: steps.sign.outputs.enabled == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Sparkle CLI tools from the resolved SPM artifact.
          BIN="$(find "$HOME/Library/Developer/Xcode/DerivedData" -ipath '*artifacts/sparkle/Sparkle/bin' -type d | head -1)"
          test -n "$BIN" || { echo "Sparkle bin not found"; exit 1; }
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out && cp "Svod.zip" "out/Svod-$VERSION.zip"
          # generate_appcast signs each archive with the private key (read from stdin) and writes appcast.xml.
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$BIN/generate_appcast" --ed-key-file - out/
          # Point downloads at this release's assets.
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          /usr/bin/sed -i '' "s#<enclosure url=\"[^\"]*/#<enclosure url=\"$BASE/#g" out/appcast.xml || true

      - name: Publish (signed)
        if: steps.sign.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            out/Svod-*.zip
            out/appcast.xml

      - name: Publish (unsigned)
        if: steps.sign.outputs.enabled != 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            Svod.zip
